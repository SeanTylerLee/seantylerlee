<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f1f5f9" />
  <title>PermitParser</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="main" class="layout">
    <section class="panel upload-panel">
      <h1 class="upload-title">PermitParser</h1>
      <p class="app-version">v1</p>
      <input type="file" id="pdf-upload" class="sr-only-input" accept="application/pdf,.pdf" />
      <label for="pdf-upload" class="file-label">
        <span class="file-ui">Choose PDF</span>
      </label>
      <div id="loading-bar" class="loading-bar loading-bar--hidden" aria-hidden="true">
        <div class="loading-bar__track">
          <div id="loading-bar-fill" class="loading-bar__fill"></div>
        </div>
      </div>
      <p id="route-progress" class="route-progress" aria-live="polite"></p>
      <p id="upload-status" class="status status--error" aria-live="polite"></p>
    </section>

    <section class="panel map-panel">
      <div id="map" class="map" role="application" aria-label="Route map"></div>
    </section>

    <section class="panel dual">
      <div>
        <h2 class="section-label">Route</h2>
        <ol id="route-hints" class="hints-list"></ol>
      </div>
      <div>
        <h2 class="section-label">Permit</h2>
        <div id="meta-panel" class="meta-panel"></div>
      </div>
    </section>

    <section class="panel raw-panel">
      <h2 class="section-label">Extracted text</h2>
      <pre id="raw-text" class="raw-text" aria-label="Extracted text"></pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
  <script src="js/mapbox-config.js"></script>
  <script src="js/supabase-config.js?v=9"></script>
  <script src="js/app.js?v=20"></script>
</body>
</html>
