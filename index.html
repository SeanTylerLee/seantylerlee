<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fafafa" />
  <title>seantylerlee</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    html, body {
      min-height: 100%;
      min-height: 100dvh;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      background: #fafafa;
      color: #111;
    }

    .mobile-only {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      min-height: 100dvh;
      padding: max(1.25rem, env(safe-area-inset-top)) max(1.25rem, env(safe-area-inset-right)) max(1.25rem, env(safe-area-inset-bottom)) max(1.25rem, env(safe-area-inset-left));
    }

    .mobile-only p {
      font-size: clamp(1.75rem, 9vw, 2.75rem);
      font-weight: 500;
      text-align: center;
    }

    .desktop-gate {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      min-height: 100dvh;
      padding: max(1.25rem, env(safe-area-inset-top)) max(1.25rem, env(safe-area-inset-right)) max(1.25rem, env(safe-area-inset-bottom)) max(1.25rem, env(safe-area-inset-left));
      text-align: center;
    }

    .desktop-gate p {
      font-size: 1.05rem;
      line-height: 1.55;
      color: #333;
      max-width: 22rem;
    }

    .desktop-gate p + p {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      color: #666;
    }

    /* Wider than typical phone (incl. landscape): show desktop notice */
    @media (min-width: 1024px) {
      .mobile-only { display: none; }
      .desktop-gate { display: flex; flex-direction: column; gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="mobile-only" aria-label="Home">
    <p>seantylerlee</p>
  </div>
  <div class="desktop-gate" role="status" aria-live="polite">
    <p>This site is meant to be used on a phone.</p>
    <p>Open <strong>seantylerlee</strong> on your mobile device.</p>
  </div>
</body>
</html>
